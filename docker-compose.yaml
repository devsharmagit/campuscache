services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-cache-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campus-cache
    volumes:
      - campus-cache:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus-cache"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  campus-cache: